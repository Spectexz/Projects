name: Daily USD/IDR Rate Tracker

on:
  schedule:
    - cron: '0 8 * * *'  # runs every day at 08:00 UTC
  workflow_dispatch:       # lets you trigger it manually too

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python call.py

      - name: Save rates.csv back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rates.csv
          git diff --cached --quiet || git commit -m "update rates $(date +'%Y-%m-%d')"
          git push